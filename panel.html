<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Umbraco Debug</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
<div id="app">

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <div id="header">
    <!-- Inline SVG logo (Umbraco-inspired "U" mark) -->
    <svg id="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="24" height="24" rx="4" fill="#1A2E4A"/>
      <path d="M7 6v7a5 5 0 0 0 10 0V6" stroke="#fff" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="19" cy="19" r="3" fill="#4EC9B0"/>
      <path d="M18 19h2M19 18v2" stroke="#1A2E4A" stroke-width="1.2"
            stroke-linecap="round"/>
    </svg>
    <h1>Umbraco Debug Tools</h1>
    <div>
      <div id="status-badge" class="btn not-detected">
        <span class="dot"></span>
        <span id="status-text">Checking…</span>
      </div>
    </div>
  </div>

  <!-- ── Toolbar ─────────────────────────────────────────────────────── -->
  <div id="toolbar">
    <div>
      <!-- Pick element -->
      <button id="btn-pick" disabled title="Click an element in the page to inject umb-debug">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M1 1l5.5 13 2-5.5L14 6.5z"/>
        </svg>
        Select Element
      </button>

      <div id="toolbar-sep"></div>

      <!-- Clear -->
      <button id="btn-clear" disabled title="Remove injected umb-debug element">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
          <path d="M2.343 13.657A8 8 0 1 1 13.657 2.343 8 8 0 0 1 2.343 13.657zM6.03 4.97 4.97 6.03 6.94 8l-1.97 1.97 1.06 1.06L8 9.06l1.97 1.97 1.06-1.06L9.06 8l1.97-1.97-1.06-1.06L8 6.94 6.03 4.97z"/>
        </svg>
        Clear
      </button>
    </div>

    <div>
      <a href="https://docs.umbraco.com/umbraco-cms/customizing/overview" target="_blank" class="btn detected no-border">
        <span>Umbraco docs</span>
      </a>
    </div>

  </div>

  <!-- ── Loading bar ──────────────────────────────────────────────────── -->
  <div id="loading-bar" class="hidden"></div>

  <!-- ── Breadcrumb (selected element info) ──────────────────────────── -->
  <div id="breadcrumb" class="hidden">
    <span style="color:var(--text-muted)">Selected:</span>
    <span id="bc-content"></span>
  </div>

  <!-- ── Banners ─────────────────────────────────────────────────────── -->
  <div id="banner-error" class="banner error hidden">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="margin-top:1px;flex-shrink:0">
      <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 3a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 8 4zm0 7.5a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5z"/>
    </svg>
    <span id="banner-error-text"></span>
  </div>

  <div id="banner-info" class="banner info hidden">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="margin-top:1px;flex-shrink:0">
      <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zM7.25 4.75a.75.75 0 0 1 1.5 0v4.5a.75.75 0 0 1-1.5 0v-4.5zm.75 7a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5z"/>
    </svg>
    <span id="banner-info-text"></span>
  </div>

  <!-- ── Main content ─────────────────────────────────────────────────── -->
  <div id="content">

    <!-- Empty state -->
    <div id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="24" height="24" rx="4" fill="#1A2E4A"/>
        <path d="M7 6v7a5 5 0 0 0 10 0V6" stroke="#fff" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="19" cy="19" r="3" fill="#4EC9B0"/>
      </svg>
      <p id="empty-message">Detect whether an Umbraco Backoffice is open,<br>then select an element to inspect its contexts.</p>
    </div>

    <!-- Output panel (shown when debug data is available) -->
    <div id="output-panel" class="hidden">
      <!-- Tab bar -->
      <div id="tab-bar">
        <button class="tab-btn active" data-tab="tree">Contexts</button>
        <button class="tab-btn" data-tab="raw">Raw JSON</button>
        <button class="tab-copy-btn tab-btn" id="btn-copy" title="Copy output to clipboard">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor">
            <path d="M0 6.75A2.75 2.75 0 0 1 2.75 4h8.5A2.75 2.75 0 0 1 14 6.75v6.5A2.75 2.75 0 0 1 11.25 16h-8.5A2.75 2.75 0 0 1 0 13.25ZM2.75 5.5A1.25 1.25 0 0 0 1.5 6.75v6.5c0 .69.56 1.25 1.25 1.25h8.5c.69 0 1.25-.56 1.25-1.25v-6.5c0-.69-.56-1.25-1.25-1.25Z"/>
            <path d="M3.5.75A2.75 2.75 0 0 1 6.25-2h8.5A2.75 2.75 0 0 1 17.5.75v6.5a2.75 2.75 0 0 1-2.75 2.75h-.5a.75.75 0 0 1 0-1.5h.5c.69 0 1.25-.56 1.25-1.25V.75C16 .06 15.44-.5 14.75-.5h-8.5C5.56-.5 5 .06 5 .75v.5a.75.75 0 0 1-1.5 0Z"/>
          </svg>
          Copy
        </button>
      </div>

      <!-- Tab: Contexts (JSON tree) -->
      <div class="tab-pane active" id="pane-tree">
        <div id="tree-view"></div>
      </div>

      <!-- Tab: Raw HTML -->
      <div class="tab-pane" id="pane-raw">
        <pre id="raw-html"></pre>
      </div>
    </div>

  </div><!-- /#content -->
</div><!-- /#app -->

<script src="panel.js"></script>
</body>
</html>
